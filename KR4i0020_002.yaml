body:
  text: 風月堂詩話巻下宋朱弁撰東坡南遷參寥居西湖智果院交㳺無復曩時之盛者嘗作湖上十絶句其間一首云去嵗春風上苑行爛窺紅紫厭生平如今眼底無姚魏浪蘂浮花懶問名又一首曰城根野水緑逶沱颭颭輕帆掠岸過日暮蕙蘭無處採渚花汀草占春多此詩既出遂有反初之禍建中靖國間曾子開為明其非辜乃始還其故服范徳儒崇寧之貶與山谷唱和甚多徳儒有一聫云慣處賤貧知世態飽諳遷謫見家風議者謂此語可以識范氏之名節矣當國者能無愧乎王介甫在舘閣時僦居春眀坊與宋次道宅相鄰次道父祖以来藏書最多介甫借唐人詩集日閲之過眼有㑹扵心者必手錄之嵗久殆録遍或取其本鏤行於世謂之百家詩選既非介甫本意而作序者曰公獨不選杜李與韓退之其意甚深則又厚誣介甫而欺世人也不知李杜韓退之外如元白夢得劉長卿李義山輩尚有二十餘家以予觀之介甫固不可厚誣而世人豈可盡欺哉葢自欺耳杜牧之風味極不淺但詩律少嚴其屬辭比事殊不精緻然時有自得處為可喜也元豐之末盗賊蠭起聞司馬温公入相衆皆盡散令作對隨家雞晁以道云指呼市人如使兒東坡最得此三昧其和人詩用韻妥帖圓成無一字不平穏葢天才能驅駕如孫吴用兵雖市井烏合亦皆為我臂指左右前却在我顧盻間莫不聽順也前後集似此類者甚多徃徃有唱首不能逮者崇寧間凡元祐子弟仕宦者並不得至都城晁以道自洛中罷官回遣妻兒歸省廬獨留中牟驛累日以詩寄京師婣舊其落句云一時雞犬皆霄漢獨有劉安不得仙此語傳於時議者美之政和戊戌三月雪昭徳諸晁皆賦詩以晉書五行志著為大異頗艱於落筆獨晁冲之叔用用王維雪圖事云從此斷疑摩詰畫雪中自合有芭蕉人稱其工陳文惠以使相守鄭日嘗有後園十絶句其間一聫云雨網蛛絲斷風枝鳥夢揺議者謂風枝鳥夢揺之語極工惜所對不稱耳吾鄊人汪愷伯强易雨網蛛絲斷為露葉螢光濕工詩者徃徃多愛之伯强畢榜及第力學不倦仕宦所至皆有聲韓師樸元符末自大名入相其所引正人端士徧滿臺閣然不能勝一曾布而張天覺扵政和初欲以一身回蔡京黨紹述之論難矣未㡬果罷去自西都留守徙南陽道過汝州香山謁大悲題長句於寺中其略云大士悲智度有情亦要時節因縁并也應笑我勞經營雖多手眼難支撑讀者莫不憐之劉伯夀洛陽九老中一老也築室嵩山下每登髙頂回則於峻極中院援筆記嵗月捐館之年題云予今年若干嵗登頂凡七十四次矣精力雖疲而心猶未足也王輔道學士與其孫宣義郎字元静忘其名㳺嵩至中院作一絶句示宣義君云爛紅一㸃出浮漚夜坐嵩峰頂上頭笑對僧窻談祖徳當年七十四回㳺伯夀既結菴玉華峰下號玉華菴主有妾名萱草芳草皆秀麗而善音律伯夀出入乗牛吹鐡笛二草以蘄笛和之聲滿山谷出門不言所之牛行即行牛止即止其止也必命壺觴盡醉而歸嵩前人以為地仙云張天覺庚寅年六月拜相唐庚子西賦内前行所紀皆當時實事云内前車馬撥不開文徳殿下聽麻回紫㣲侍郎拜右相中使押赴文昌臺旄頭昨夜光照牖是夕收芒如秃帚明朝化作甘雨来官家新得調元手周公禮樂未要作致身姚宋也不惡我聞二公作相年人間斗米三四錢蔡嶷見其詩惡之遂中以事貶嶺外天覺相繼亦出子西又賦益昌道中三月梅花詩云桃花能紅李能白春深無處無顔色不應尚有數枝梅可是東君苦留客向来開處當嚴冬桃花未在交逰中即今已自丈人行勿與少年爭春風此詩亦為新進所忌元祐間哲宗皇帝幸太學宰相吕㣲仲有詩四韻其第三聫云再拜新儀瞻魯聖一篇古訓監周王謂是日謁先聖初行再拜之禮及祭酒豐稷講無逸也然韓退之處州孔子廟碑云自天子而下北面拜跪薦祭進誠肅退禮如親弟子則唐以来行之矣豈本朝偶未舉此禮也邪不然安得謂之新儀哉或云本朝雖曾行而止扵再拜遂著之禮典乃從當時曲臺之請也李義山題馬嵬一聫云此日六軍同駐馬當時七夕笑牽牛温庭筠題蘇武廟云回日樓臺非甲帳去時冠葢是丁年嘗見前輩論詩云用事屬對如此者罕有李義山文帝廟詩云可憐半夜虚前席不問蒼生問鬼神用事如此可謂有功矣本朝趙周翰亦有詩云露臺枉惜千金費却把銅山賜幸臣可與義山並驅争先矣唐秦系和韋蘇州詩具銜云東海釣客試秘書省校書郎本朝陳恬叔易隠居頴川陽翟澗上號澗上文人大觀間宋喬年諷監司薦扵朝起為館閣書疏間猶不去丈人之號晁以道作詩譏之曰東海一生垂釣客石渠萬巻校書郎丈人風味今如此鶴到揚州興更長其後以道謁叔易扵京師有婢應門嚴妝麗服熟視之乃故時澗上赤脚也以道又作一絶云處士何人為作牙盡携猿鶴到京華可憐巖壑空惆悵六六峰前少一家王平甫閲韓退之送石洪温造二處士詩序云退之善與處士作牙館職劉彦祖寄友人詩一聮云别後頻芳草愁邉更落花予舉示晁以道云此語酷似劉夢得殊可喜也唐張繼宿平望詩云姑蘇城外寒山寺夜半鐘聲到客船永叔云句誠佳其奈夜半非撞鐘時予覧南史載齊宗室讀書常以中宵鐘鳴時為限前代自有半夜鐘豈永叔偶忘之也江浙間至今有之蘇黄門評參寥詩云酷似唐儲光羲參寥曰某平生未嘗聞光羲名况其詩乎或曰公暗合孫吳有何不可劉夢得嘉話云九日作詩欲用餻字韻苦無故實予觀隋五行志載謡言曰八月刈禾傷旱九月食餻正好則不為無故實矣豈夢得偶未見之耶曹暌字彦達慈聖光獻太皇太后之再世孫也氣直不茍合善屬文為曾子開所知張芸叟甞與其父侍讀使北暌後見芸叟於長安芸叟贈詩云故人有子早遺孤三十陞朝短丈夫但取聲名似祖徳不曾辛苦謁當塗其為名流所器重如此太學生雖以治經荅義為能其間甚有可與言詩者一日同舎生誦介甫眀妃曲至漢恩自淺胡自深人生樂在相知心君不見咫尺長門閉阿嬌人生失意無南北詠其語稱工有朩抱一者艴然不悦曰詩可以興可以怨雖以諷刺為主然不失其正者乃可貴也若如此詩用意則李陵偷生異域不為犯名教漢武誅其家為濫刑矣當介甫賦詩時温國文正公見而惡之為别賦二篇其詞嚴其義正蓋矯其失也諸君曷不取而讀之乎衆雖心服其論而莫敢有和之者崇寧中羅竦叔恭甞為予言頃赴太學秋試時自廣陵取道隋隄見官驛中朩槿花過客題詩甚多其間一絶句云朝炊不及黔暮車不生角故應庭下花無人見開落人亦有題字於其側而賞嘆之者但恨不見賦詩者姓名耳竦與兄靖仲謀俱登第亦有詩名杜牧之九日齊山登髙詩落句云牛山何必涙沾衣蓋用齊景公㳺於牛山臨其國流涕事泛言古今共盡登臨之際不必感嘆耳非九日故實也後人因此乃扵詩或詞遂以牛山作九日事用之亦猶牧之用顔延年一麾出守為旌麾之麾皆失於不精審之故也王立之夏均父俱以宗女夫入仕立之讀書喜賓客黄魯直諸晁皆與之善著歸叟詩話行於世均父名倪饒財亦好學立之晚年中風以左手作字均父寄詩云猶喜平生蟹螯手尚能半幅寫行書晁以道見其詩遂與之徃還立之名直方為人正稱其名然罕有知者朱行中知廣州東坡自海南歸留廣甚疑其唱和詩亦多坡還嶺北聞行中到廣士大夫頗以亷潔少之至毗陵夢中得詩一首寄行中云舜不作六器誰能貴璵璠哀哉楚狂士抱璞號空山其末章云何如鄭子産有禮國自閒至今不貪寳凜然照塵寰紙尾又題云夢中得此詩自不曉其意今寫以奉寄夢中分明用此色紙也或言東坡絶筆扵此詩其愛行中也甚矣不欲正言其事聊假夢以諷之耳其後行中果以此免坡真知言哉李義山擬老杜詩云嵗月行如此江湖坐𣺌然直是老杜語也其他句蒼梧應露下白閣自雲深天意憐幽草人間重晚情之類置杜集中亦無愧矣然未似老杜沉涵汪洋筆力有餘也義山亦自覺故别立門户成一家後人挹其餘波號西崑體句律太嚴無自然態度黄魯直深悟此理乃獨用崑體工夫而造老杜渾成之地今之詩人少有及此者禪家所謂更髙一著也鄭谷都官在唐號躭句者甞有詩云衰遲自喜添詩學時取前題改數聮是也然氣格不髙初以鷓鴣詩得名人謂之鄭鷓鴣近世士人有贈一貴官詩云賦令處士慚鸚鵡詩遣都官讓鷓鴣世亦多誦之而莫有能道其姓名者東坡言玉川子月蝕詩云嵗星主福徳官爵奉董秦忍使黔婁生覆尸無衣巾詳味此句則董秦當時無功而享厚禄者董秦李忠臣也天寳末驍勇屢立戰功雖麄暴亦頗知忠義代宗時吐蕃犯闕徵兵忠臣即日赴難或勸擇日忠臣怒曰君父在難乃擇日耶後卒汚朱泚偽命而誅考其終始非無功而享厚禄者不知玉川子何以有此句東坡中秋詩云暮雲收盡溢清寒銀漢無聲轉玉盤此生此夜不長好眀月明年何處㸔紹聖元年自録此詩仍題其後云子十八年前中秋夜與子由觀月彭城時作此詩以陽闗歌之今後遇此夜宿於贛上方南遷嶺表獨歌此曲聊復書之以識一時之事殊未覺有今日之悲但懸知為他日之喜也晁察院季一名貫之清修善吐論客言東坡甞自詠海棠詩至雨中有淚亦悽愴月下無人更清淑之句謂人曰此兩句乃吾向造化窟中奪將来也客曰坡此語蓋戱客耳世豈有奪造化之句季一曰韓退之云語妙斡元造如老杜落絮游絲白日静鳴鳩乳燕青春深雖當隆冬沍寒時誦之便覺融怡之氣生於衣裾而韶光美景宛然在目動盪人思豈不是斡元造而奪造化乎賈伋為予言文潞公出鎭長安日吾祖文元公知許昌游公曲水園留詩云夭桃穠李艷芳辰丞相園林潩水濱虎節麟符抛不得却將佳景付遊人公得詩甚喜乃作書并封園劵與文元曰可便作園中主人也伋字仲思文元五世孫也鄭廣文唐諸儒多稱其善著書而不及其詩杜甫八哀詩云昔獻書畫圖新詩亦俱徃滄洲動玉陛宫鶴悮一響三絶自御題四方尤所仰則與史官所載亦略相似是能畫之外所能亦不少然甫於䖍詩則其相推服之語不及許十四髙三十五元道州輩逺甚豈其詩之工比其畫不為愧也耶不然甫於䖍情分如彼論其詩不應如此略也僧惠崇善畫人多寳其畫而不知其能詩宋子京以書託梵才大師編集其詩則當有可傳者而人或未之見恐雖編集而未大行於世耳晁季一檢討甞為子言歸田錄所記聖俞賦河豚云春洲生荻芽春岸飛楊花河豚於此時貴不數魚蝦則是食河豚時正在二月而吾妻家毗陵人争新相問遺㑹賓客惟恐後時價雖髙無吝色多在臘月過上元則不復貴重所食時節與歐公稱賞聖俞絶不相同豈聖俞賦詩之地與毗陵異耶風氣所産隨地有早晚亦未可一概論也故為記之有論詩者曰老杜以稷契自許而有志於斯人者故於茅屋為秋風所拔歌其詞云安得廣厦數千間大庇天下寒士俱歡顔又云嗚呼眼前何如突兀見此屋吾廬獨破受凍死亦足意在是也予曰孟子論士窮則獨善其身達則兼善天下又言得志事雖不兩立而窮能不忘兼善不得志而能不忘澤民乃仁人君子之用心也白樂天新製布裘詩云安得萬里裘温暖被四垠亦其例也然韓退之作謝鄭羣簟詩則曰側身甘寢百疾愈却願天日長炎曦其意與子美樂天絶不相似然退之豈是無意於斯人者但於援毫之際偶輸二老一着耳客大笑曰退之文章不喜蹈襲前人其用意豈出於此耶抑為人朩强於吟詠猶然果如歐梅所論也客或謂予曰篇章以故實相夸起於何時予曰江左自顔謝以来乃始有之可以表學問而非詩之至也觀古今勝語皆自肺腑中流出初無綴緝工夫故鍾嶸云經國文符應資博古撰徳駁奏宜窮徃烈至於吟詠性情亦何貴於用事思君如流水既是即目髙臺多悲風亦唯所見清晨登隴首羌無故實明月照積雪詎出經史其所論為有淵源矣客又曰僕見世之愛老杜者甞謂人曰此老出語絶人無一字無来處審如此言則詞必有據字必援古所由来逺有不可巳者予曰論事當考源流今言詩不究其源而踵其末流以為標凖不知國風雅頌祖述何人此老句法妙處渾然天成如蟲蝕朩不待刻雕自成文理其鼓鑄鎔瀉殆不用世間槖籥近古以還無出其右真詩人之冠冕也如近體格俯同今作則詞不遺竒雜以事實掇英擷華妥帖平穩殆以文為滑稽特詩中之一事耳豈見其大全者耶予每竊有所恨故樂以嶸之言告人吾子誠嗜詩試以嶸言於愛杜者求之則得矣風月堂詩話巻下
