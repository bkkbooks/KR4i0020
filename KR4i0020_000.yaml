body:
  text: 風月堂詩話詩文評類提要臣等謹案風月堂詩話二卷宋朱辨撰辨有曲洧舊聞已著録是編多記元祐中歐陽修蘇軾黃庭堅陳師道梅堯臣及諸朝遺事首尾兩條皆發明鍾嶸思君如流水既是即目明月照積雪羌無故實之義蓋其宗㫖所在其論黃庭堅用崑體工夫而造老杜渾成之地尤為窺見深際後來論黃詩者皆所未及前有自序題庚申閏月考庚申為紹興十年當金熙宗天眷三年辨以建炎元年使金留十七年乃還則在金時所作也末有咸淳壬申月觀道人跋稱得于永城人朱伯玉家蓋北方所傳之本意辨使金時遺其藁于燕京度宗時始傳至江左故朝陳二家皆不著録觀元好問中州集收録辨詩知其著作散落北方者多固不得以晚出疑之矣其序但題甲子不著紹興紀年殆亦金人傳寫不用敵國之號為之削去歟乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀風月堂詩話原序豫在東里於所居之東小園之西有堂三楹壁間多皇朝以來諸名卿畫像而文籍中多與左司馬班韓歐蘇數公相對以其地無松竹且去山水甚逺而三徑閒寂庭字虛敞凡過我門而滿吾座者唯風與月耳故斯堂也以風月得名又豫心空洞無城府見人雖昧生平必出肺腑相示以此語言多觸忌諱而招悔吝每客至必戒之曰是間止可談風月捨此不談而泛及時事請釂吾大白厥後山淵反覆兵火肆虐堂于兹時均被赭垣之酷風月雖存賓客安往豫復以使事羈絆㶟河閲厯星紀追思曩游風月之談十僅省四五乃纂次為二卷號風月堂詩話歸詒子孫異時幅巾林下摩挲泉石時取觀之則曲洧風月猶在吾目中也庚申閏月戊子觀如居士朱辨叙
