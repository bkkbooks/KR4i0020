body:
  text: 風月堂詩話跋右風月堂詩話二巻得之於永城人朱伯玉家斷爛脱誤葢北方所傳本也予嘗見北客元遺山詞謂劉九伯夀騎牛吹笛使二草和之意其得之山中故老本無所出也今其事乃具於此信乎讀者之不可以不博也故為鈔之楮中而識於篇末如此咸淳壬申嘉平月交年節月觀道人誌
