body:
  text: 風月堂詩話巻上宋朱弁撰魏曹植詩出於國風晉阮籍詩出於小雅其餘遞相祖襲雖各有師承而去風雅猶未逺也自魏晉至宋雅奥清麗尤盛扵江左齊梁已下不足道矣唐初尚矜徐庾風氣逮陳子昻始變若老杜則凜然欲方駕屈宋而能允蹈之者其餘以詩名家尚多有江左體制至五季則掃地無可言者唐人尚不能及况晉宋乎晉宋尚不能及况風雅乎詩人勝語咸得扵自然非資博古若思君如流水髙臺多悲風清晨登隴首眀月照積雪之類皆一時所見發於言辭不必出於經史故鍾嶸評之云吟詠性情亦何貴於用事顔謝推輪雖表學問而太始化之寖以成俗當時所以有書鈔之譏者葢為是也大抵句無虛辭必假故實語無空字必究所從拘攣補綴而露斧鑿痕迹者不可與論自然之妙也詩之重用韻音同義異者古人用之無嫌如民勞詩一章用二休字韻是也後人狃於科舉之習遂不敢用唐韓退之荅張徹詩用二庭字石鼓詩用二科字老杜䕫府書懐詩用二旋字即其例也詩人體物之語多矣而未有指一物為題而作詩者晉宋以来始命操觚而賦詠興焉皆倣詩人體物之語不務以故實相夸也梁庾肩吾應教詠胡牀云傳名乃外域入用信中京足欹形已正文斜體自平是也至唐杜甫詠蒹葭云體弱春苖早藂長夜露多則亦未始求故實也如其他詠薤云束比青芻色圓齊玉筯頭黄梁云味豈同金菊香宜配綠葵則於體物外又有影寫之功矣予與晁叔用論此叔用曰陳無巳甞舉老杜詠子規云𣺌𣺌春風見蕭蕭夜色悽客懐那見此故作傍人低如此等語蓋不從古人筆墨畦徑中来其所鎔裁殆别有造化也又惡用故實為哉詩之句法自三言至七言三百篇中皆有之矣三言如麟之趾夜未央從夏南思無邪之類是也五言如誰謂䑕無牙胡為乎株林或燕燕居息或盡瘁事國之類是也七言如維昔之富不如時維今之疚不如茲學有緝熈于光明之類是也而世之論五言則指蘓李論七言則指栢梁為始是不求其源也然世多作七言五言而三言四言類施於銘頌之中雖間有用七言者獨扵韓吏部蘇端明集見之前輩云按栢梁之體句句用韻其數以竒韓蘇亦皆如此然歐公作孫明復墓誌乃與此説不同又未知何如也豈歐公特變前人法度欲自我作古乎當更討論之耳道林嶽麓寺老杜詩云宋公放逐曾題此物色分留遺老夫監察御史唐扶詩云兩祠物色採拾盡壁間杜甫真少恩宋考功以詩在天后時與沈詹事齊名唐扶詩亦有聞於世今觀甫所自述及扶詩之語則是宋之問猶有未道盡處扶雖𡨕搜不能出其右韓昌黎謁衡岳廟詩云五岳祭秩皆三公四方環鎮嵩當中火維地荒足妖怪天假神柄專其雄噴雲泄霧藏半腹雖有絶頂誰能窮我来正逢秋雨節隂氣晦昧無清風潛心黙禱若有應豈非正直能感通湏㬰净掃衆峰出仰見突兀撑青空東坡作退之廟記云公之精誠能開衡山之雲即取此詩也其議論雄偉讀者皆竦或謂坡取此似傷於太易予曰三百篇詩中有婦人女子自言志者仲尼不刪去以垂訓後世乃獨疑坡之於退之乎况坡所閲文字過眼無遺者他人縱時有所採不過蓄以為詩材耳必有未作大碑版而能取之以為議論者此便是坡不可及處君又何病哉長安太一湫林木隂森水色湛然魚遊水面不怖人人莫敢取者林間葉落鳥輒銜去逺棄之終年無一葉能墮波上者韓退之詩云魚蝦可俯掇神物安敢寇林柯有脱葉欲墮鳥驚救争銜彎環飛投棄急哺􅑹葢實載其事自唐以来已如此今人所傳非過論也􅑹音寇鳥子生哺者韓退之云餘事作詩人未可以為篤論也東坡以詞曲為詩之苖裔其言良是然今之長短句比之古樂府歌詞雖云同出於詩而祖風巳掃地矣晁無咎晚年因評小晏并黄魯直秦少㳺詞曲甞曰吾欲托興於此時作一首以自遣政使流行亦復何害譬如雞子中元無骨頭也歐公評聖俞初喜為清麗閑肆平淡久則涵演深逺間以琢刻以出怪巧然氣完力餘益老以勁其應於人者多故詞非一體於他文章皆可喜非如唐諸子號詩人者僻固而狭陋也又為人樂易未甞忤於物至於窮愁感憤有所譏罵笑謔一發於詩然用以為驩而不怨懟可謂君子者也歐公居頴上申公吕晦叔作太守聚星堂燕集賦詩分韻公得松字申公得雪字劉原父得風字魏廣得春字焦千之得石字王回得酒字徐無逸得寒字又賦室中物公得鸚鵡螺盃申公得癭壺劉原父得張越琴魏廣得澄心堂紙焦千之得金星研王回得方竹杖徐無逸得月硯屏風又賦席間果公得橄欖申公得紅蕉子劉原父得温柑魏廣得鳯棲蕉千之得金橘王回得荔枝徐無逸得楊梅又賦壁間畫像公得杜甫申公得李文饒劉原父得韓退之魏廣得謝安石焦干之得諸葛孔明王回得李白徐無逸得魏鄭公詩編成一集流行於世當時四方能文之士及館閣諸公皆以不與此㑹為恨聚星堂詠雪約云玉月梨花練絮白舞鵝鶴等事皆請勿用杜祁公覽之嗟賞作詩贈歐公云嘗聞作者善評議詠雪言白匪精思及窺古人今人詩未能一一去其類不將桞絮比輕揚即把梅花作形似或夸瓊樹鬭玲瓏或取瑤臺造嘉致散鹽舞鶴實有徒吮墨含毫不能既深悼無人可踐言一旦見君何卓異又云萬狀驅從物外来終篇不渉題中意宜乎衆目詩之豪便合登壇推作帥回頭且報郢中人從此陽春不為貴祁公耆徳碩望歐公為文章宗師祁公禮所宜厚然前輩此風類多有之所可嘆息者後来無繼耳蘇子美竹軒之集皆當時名士王勝之賦詩人皆屬和子美詩其略云君與我同好數過我不窮對之酌綠酒又為鳴絲桐作詩寫此意韻如霜間鐘清篇與翠榦嵗久日益濃惜哉嵇阮放當世巳不容吾儕有雅尚千載挹髙蹤後月餘一網打盡之語既喧物論而梅聖俞為賦覆鼎傷衆賔之詩乃悟子美當世已不容之句遂成詩䜟亦可怪也晁美叔秋監以集句示劉貢父貢父曰君髙明之識輔以家世文學乃作此等生活殊非我素所期也吾嘗謂集古人句譬如蓬蓽之士適有重客既無自巳庖厨而器皿肴蔌悉假貸於人收拾餖飣盡心盡力意欲强學豪奢而寒酸之氣終是不去若有不速排闥而入則倉皇敗績矣非如貴公子供帳不移水陸之珍咄嗟而辦也美叔深味其言歸告其子曰吾初為戯不知貢父愛我一至於此也東坡云詩文豈在多一頌了伯倫是伯倫他文字不見於世矣予嘗閲唐史藝文志劉伶有文集三巻則伯倫非無他文章也但酒徳頌幸而傳耳東坡之論豈偶然得於落筆之時乎抑别有所聞乎唐張司業籍得裴晉公馬謝詩云乍離華廐蹄猶澁初到貧家眼尚驚王介甫曰觀詩意乃是一匹不善行眼生駑馬耳我若作晉公見此詩當湏大慚也或曰籍為晉公所厚以詩謝馬必不敢爾况詩人用意不以此為工自是介甫所以期籍者淺也白樂天自中書舍人出知蘇州劉夢得外集有戱酧白舍人曹長寄詩言游宴之盛一篇破題云蘇州刺史例能詩西掖今来替左司左司謂韋應物也晁伯宇少與其弟冲之叔用俱從陳無已學無已建中靖國間到京師見叔用詩曰子詩造此地必湏得一悟門叔用初不言無巳再三詰之叔用云别無所得頃因㸔韓退之雜文自有入處無已首允之曰東坡言杜甫似司馬遷世人多不解子可與論此矣沈造嘗言湖隂有遺鞭驛葢識晉明帝㣲行視王敦營事也温飛卿所賦湖隂辭刻石在驛中前後過客作詩甚多唯一篇最佳而不著姓名其詩云鷁船犀甲下荆州蜂目將軍擁碧油虎帳覺来驚日墮龍媒嘶去劇星流姦萌問鼎身何在計中遺鞭事可羞幽草野花埋石徑無人為作晉陽秋造為新鄭令以差車運糧事不均力争罷去已而朝廷知其愛民不屈俾還本任有識者稱其慈惠出扵至誠以比古循吏造字㑹道蔡之西平人霍榜擢第官止於奉議郎良可惜也山行有常程中夜尚未安㣲月沒巳久崖傾路何難大江動我前洶若溟渤寛篙師理闇楫歌嘯輕波瀾霜濃朩石滑風急手足寒入舟已千憂陟險仍萬盤回眺積水外始知衆星乾逺遊令人疲衰疾漸加餐此水㑹渡詩也東坡云老杜自秦州越成都所厯輒作一詩數千里山川在人目中古今詩人殆無可擬者獨唐明皇遣吴道子乗傳畫蜀道山川歸對大同殿索其畫無有曰在臣腹中請疋素寫之半日而畢明皇後幸蜀皆黙識其處惟此可比耳老杜劔閣詩云惟天有設險劒門天下壯連山抱西南石角皆北向宋子京知成都過之誦此詩謂人曰此四句葢劒閣實録也閉門覔句陳無已對客揮毫秦少游正字不知温飽未春風吹淚古藤州此黄魯直詩也魯直作此詩時無已作正字尚無恙建中靖國間樓异試可知襄邑縣夢無巳来相别且云東坡少㳺在杏園相待久矣明日無已之訃至乃大驚異作書與參寥言其事杏園見道家書乃海上神仙所居之地也仙龕虛室以待白樂天之説豈不信然耶東坡知貢舉李豸方叔久為東坡所知其年到省諸路舉子人人欲識其面考試官莫不欲得方叔也坡亦自言有司以第一拔方叔耳既拆號十名前不見方叔衆已失色逮寫盡榜無不駭歎方叔歸陽翟黄魯直以詩叙其事送之東坡和焉如平生漫説古戰塲過眼真迷日五色之句其用事精切雖老杜白樂天集中未嘗見也參寥自餘杭謁坡於彭城一日燕郡寮謂客曰參寥不與此集然不可不惱也遣官妓馬盻盻持紙筆就求詩焉參寥詩立成有禪心已似沾泥絮不逐東風上下狂之句坡大喜曰吾嘗見桞絮落泥中私謂可以入詩偶未曾收拾遂為此人所先可惜也坡在餘杭日因㑹客以彩牋作墨竹贈官妓且令索詩於參寥參寥援筆立就其詩曰小鳯團牋已自竒謫仙重掃嵗寒枝稍頭餘墨猶含潤恰似梳風洗雨時辯才大師梵學精深戒行圓潔為二浙歸重當時無一語文章一日忽和參寥寄秦少游詩其末句云臺閣山林本無異想應文墨未離禪東坡見之題其後云辯才生来未嘗作詩今年八十一嵗矣其落筆如風吹水自成文理我輩與參寥如巧人織繡耳陳無已與晁以道俱學文於曾子固子固曰二人所得不同當各自成一家然晁文必以著書名於世無已晚得詩法於魯直他日二人相與論文以道曰吾曹不可負曾南豐又論詩無巳曰吾此一瓣香湏為山谷道人燒也政和以後花石綱寖盛晁伯宇有詩云森森月裏栽丹桂厯厯天邉種白榆雖未乗槎上霄漢㑹湏沉網取珊瑚人多傳誦伯宇名載之少作閔吾廬賦魯直以示東坡曰此晁家十郎所作年未二十也東坡荅云此賦甚竒麗信是家多異材耶凡文至足之餘自溢為竒怪今晁傷竒太早可作魯直㣲意諭之而勿傷其邁徃之氣伯宇自是文章大進東坡之語委曲如此可謂善成人物者也東坡文章至黄州以後人莫能及唯黄魯直詩時可以抗衡晚年過海則雖魯直亦若瞠乎其後矣或謂東坡過海雖為不幸乃魯直之大不幸也東坡詩文落筆輒為人所傳誦每一篇到歐公處公為終日喜前後類如此一日與棐論文及坡公歎曰汝記吾言三十年後世上人更不道着我也崇寧大觀間海外詩盛行後生不復有言歐公者是時朝廷雖嘗禁止賞錢增至八十萬禁愈嚴而其傳愈多徃徃以多相夸士大夫不能誦坡詩者便自覺氣索而人或謂之不韻趙眀誠妻李格非女也善屬文於詩尤工晁無咎多對士大夫稱之如詩情如夜鵲三遶未能安少陵也自可憐人更待来年試春草之句頗膾炙人口格非山東人元祐間作館職參寥在詩僧中獨無蔬筍氣又善議論嘗與客評詩客曰世間故實小説有可以入詩者有不可以入詩者惟東坡全不揀擇入手便用如街談巷説鄙俚之言一經坡手似神仙㸃瓦礫為黄金自有妙處參寥曰老坡牙頰間别有一副爐鞲他人豈可學耶座客無不以為然草朩之葉大者莫大於芭蕉晁文元詠芭蕉詩云葉外更無葉非獨善狀芭蕉而對之曰心中别有心其體物亦無遺矣聖俞少時專學韋蘇州世人咀嚼不入唯歐公獨愛翫之然歐公之論不及者蓋有深㫖後有知聖俞者當自知之耳風月堂詩話巻上
